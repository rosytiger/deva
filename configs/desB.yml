# config 
general: 
  cuda: true
  seed: 2
  outputs: /scratch/users/gelnesr/desB # path for outputs
  save_outputs: true

input: 
  pdb: inputs/desB.pdb #"inputs/2VVB.pdb" # the pdb

evolution: 
  n_generations: 35
  n_individuals: 20
  n_mutations: 1

seq_model: ligandmpnn   # choices: ligandmpnn or proteinmpnn

models: 
  plip:
    weights: null
    metals: null

  metal3d:
    model_path: ./models/metal3d/weights/metal3d_cat.pth #./models/metal3d/weights/metal_0.5A_v3_d0.2_16Abox.pth
    max_metal_p: 0.2
    threshold: 5

  ligandmpnn: 
    model_path: ./models/ligandmpnn/model_params/ligandmpnn_v_32_020_25.pt
    packer_path: ./models/ligandmpnn/model_params/ligandmpnn_sc_v_32_002_16.pt
    var_residues: "A58 A60 A79 A81 A101 A103 A131 A159 A161 A182"
    fixed_residues: ""       # e.g. "A12 A13 A14 B2 B25"
    bias_AA:  "H:1.5"         # e.g. "A:-1.024,P:2.34,C:-12.34"
    bias_AA_per_residue: ""  # e.g. "A12:A:-1.024,P:2.34"
    omit_AA: "C"
    omit_AA_per_residue: ""
    symmetry_residues: ""    # e.g. "A12,A13,A14|C2,C3|A5,B6"
    symmetry_weights: ""
    homo_oligomer: 0
    repack_everything: 0
    sc_num_denoising_steps: 8
    sc_num_samples: 1
    ligand_mpnn_cutoff_for_score: 20.0
    use_atom_context: 1
    temperature: 0.5
    zero_indexed: 0
    autoregressive_score: 0
    single_aa_score: 1
    chains_to_design: ""
    parse_these_chains_only: ""
    parse_atoms_with_zero_occupancy: 0
    verbose: false
  
  proteinmpnn: 
    model_path: ./models/ligandmpnn/model_params/proteinmpnn_v_48_010.pt
    ligand_mpnn_cutoff_for_score: 20.0
    temperature: 0.5
    zero_indexed: 0
    autoregressive_score: 0
    single_aa_score: 1 
    fixed_residues: ""       # e.g. "A12 A13 A14 B2 B25"
    bias_AA: ""              # e.g. "A:-1.024,P:2.34,C:-12.34"
    bias_AA_per_residue: ""  # e.g. "A12:A:-1.024,P:2.34"
    omit_AA: "C"
    omit_AA_per_residue: ""
    symmetry_residues: ""    # e.g. "A12,A13,A14|C2,C3|A5,B6"
    symmetry_weights: ""
    homo_oligomer: 0
    chains_to_design: ""
    parse_these_chains_only: ""
    parse_atoms_with_zero_occupancy: 0
    verbose: false
